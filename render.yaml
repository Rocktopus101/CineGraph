# Render Blueprint — deploy the FastAPI backend without Cloud Run.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: cinegraph-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DEV_MODE
        value: "false"
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_CHAT_MODEL
        value: "gemini-2.5-flash"
      - key: GEMINI_CHAT_MODEL_FALLBACKS
        value: "gemini-2.5-flash-lite,gemini-3.1-flash-lite,gemini-1.5-flash"
      - key: TMDB_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ORIGIN_REGEX
        value: "https://.*\\.vercel\\.app"
      - key: CHAT_USE_AGENT
        value: "false"
      - key: CHAT_SKIP_RETRIEVAL
        value: "true"
