services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: cinegraph
      POSTGRES_PASSWORD: cinegraph
      POSTGRES_DB: cinegraph
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinegraph -d cinegraph"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    platform: linux/arm64
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://cinegraph:cinegraph@db:5432/cinegraph
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./sample-export:/sample-export:ro
      - ./scripts:/scripts:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  pgdata:
